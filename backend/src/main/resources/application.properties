#! Main app name shown in logs and Spring Boot info
#! Nama app utama yang keluar dalam log dan info Spring Boot
spring.application.name=prayer-pattern-viewer

#! These database settings first try environment variables, then fall back to H2 for easy local use
#! Setting database ni cuba environment variable dulu, lepas tu fallback ke H2 untuk guna local dengan senang
spring.datasource.url=${DB_URL:jdbc:h2:mem:prayerdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

#! update means Hibernate can create/update tables from entity classes
#! update maksudnya Hibernate boleh buat atau update table ikut class entity
//WARN Good for learning and local work, but production apps usually use migrations instead
//WARN Sesuai untuk belajar dan local, tapi production biasanya pakai migration instead
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#! H2 console is a browser page that lets you inspect the in-memory database
#! H2 console ni page browser yang bagi kita tengok isi database dalam memori
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#! JWT secret signs login tokens, so changing it logs out old tokens
#! JWT secret ni sign token login, jadi kalau tukar dia token lama akan terus tak valid
//WARN In real deployment, do not keep the default secret shown here
//WARN Untuk deployment sebenar, jangan simpan secret default yang tunjuk kat sini
app.jwt.secret=${JWT_SECRET:change-this-secret-key-change-this-secret-key-123456}
#! Token expiry in milliseconds; 86400000 means about 24 hours
#! Tempoh luput token dalam milliseconds; 86400000 lebih kurang 24 jam
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
